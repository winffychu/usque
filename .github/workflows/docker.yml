name: Build and Push Docker Image

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:  # 手动触发构建
  schedule:
    - cron: '0 2 * * *'  # 每天 UTC 2:00 同步上游 → 自动构建

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  UPSTREAM_REPO: winffychu/usque

jobs:
  sync-upstream:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    outputs:
      synced: ${{ steps.sync.outputs.SYNC_NEEDED }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # push 需要 token 有写权限
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync upstream
        id: sync
        run: |
          git remote add upstream https://github.com/${{ env.UPSTREAM_REPO }}.git
          git fetch upstream main
          if git diff --quiet HEAD upstream/main; then
            echo "SYNC_NEEDED=false" >> $GITHUB_OUTPUT
            echo "[*] 上游无新变更，跳过同步"
          else
            echo "SYNC_NEEDED=true" >> $GITHUB_OUTPUT
            echo "[*] 检测到上游新变更，开始同步..."
            git reset --hard upstream/main
            git push origin main
            echo "[✓] 同步完成"
          fi

  docker-build:
    needs: sync-upstream
    if: |
      always() && (
        github.event_name != 'schedule' && github.event_name != 'workflow_dispatch' ||
        needs.sync-upstream.result == 'success'
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=long
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp || github.event.repository.updated_at }}
            VCS_REF=${{ github.sha }}